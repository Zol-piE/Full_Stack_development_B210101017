<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfect Rotate + Scale</title>

    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      .Container {
        width: 80%;
        height: 100%;
        margin: 0 auto;
        background-color: rgb(255, 255, 139);
        display: grid;
        justify-content: center;
        align-content: center;
      }

      /* OUTER handles scaling */
      .Wrapper {
        transition: transform 0.3s;
      }

      .Wrapper:hover {
        transform: scale(1.5);
      }

      /* INNER handles rotation */
      .Box {
        width: 75px;
        height: 75px;
        /* background-color: rgb(246, 83, 83); */
        display: flex;
        border-radius: 2rem;
        justify-content: center;
        align-items: center;

        box-shadow:
          5px 5px 20px 3px gray,
          -5px -5px 30px 3px gray;

        animation: spin 3s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(1turn);
        }
      }

      /* keep text stable */
      .Box p {
        animation: counterSpin 3s linear infinite;
      }

      @keyframes counterSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-1turn);
        }
      }
    </style>
  </head>

  <body>
    <div class="Container">
      <div class="Wrapper">
        <div class="Box">
          <p>BOX</p>
        </div>
      </div>
    </div>
  </body>
</html>
