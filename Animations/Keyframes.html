<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfect Rotate + Scale</title>

    <style>
      * {
        margin: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      .Container {
        width: 80%;
        height: 100%;
        margin: 0 auto;
        background-color: rgb(255, 255, 139);
        display: grid;
        justify-content: center;
        align-content: center;
        gap: 50px;
      }

      /* OUTER handles scaling */
      .Wrapper {
        transition: transform 0.3s;
      }

      .Wrapper:hover {
        transform: scale(1.5);
        font-size: 1.25rem;
      }

      /* INNER handles rotation */
      .Box {
        width: 75px;
        height: 75px;
        /* background-color: rgb(246, 83, 83); */
        display: flex;
        border-radius: 2rem;
        justify-content: center;
        align-items: center;

        box-shadow:
          5px 5px 20px 3px gray,
          -5px -5px 30px 3px gray;

        animation: spin 3s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(1turn);
        }
      }

      /* keep text stable */
      .Box p {
        animation: spin 3s linear infinite reverse;
      }
      .BoxTwo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 75px;
        height: 50px;
        background-color: rgba(245, 72, 20, 0.937);
        color: white;
        text-transform: uppercase;
        font-weight: bold;
        animation: slide 10s linear 1s infinite;
      }
      @keyframes slide {
        0% {
        }
        20% {
          transform: translateX(50px);
          background-color: blueviolet;
        }
        40% {
          transform: translateX(100px);
          background-color: rgb(224, 8, 159);
        }
        60% {
          transform: translateX(50px);
          background-color: rgb(19, 205, 87);
        }
        80% {
          transform: translateX(0px);
          background-color: rgb(19, 162, 205);
        }
        100% {
        }
      }
    </style>
  </head>

  <body>
    <div class="Container">
      <div class="Wrapper">
        <div class="Box">
          <p>BOX</p>
        </div>
      </div>
      <div class="BoxTwo">
        <p>Box-2</p>
      </div>
    </div>
  </body>
</html>
