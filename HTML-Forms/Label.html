<!doctype html>
<html lang="en">
  <head>

        type="text"

        placeholder="Name"
        required

      <br /><br />
      <input type="email" required /> <br /><br />
      <textarea rows="5" cols="5"> Mulitple line text</textarea>
      <br /><br />
