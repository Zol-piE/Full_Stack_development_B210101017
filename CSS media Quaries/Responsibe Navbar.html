<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Header</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
      }

      .MainHeader {
        width: 100%;
        background-color: aqua;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
      }

      .navBar {
        display: flex;
        gap: 10px;
      }

      .navBar a {
        padding: 15px 20px;
        text-decoration: none;
        color: black;
        font-weight: bold;
        border-radius: 0.5rem;

        /* Clean, effective transitions */
        transition:
          background-color 0.3s ease,
          transform 0.3s ease,
          border-radius 0.3s ease;
      }

      .navBar a:hover {
        background-color: beige;
        border-radius: 2rem;
        transform: scale(0.95);
      }

      /* Tablet view */
      @media screen and (max-width: 740px) {
        .navBar {
          gap: 5px;
        }

        .navBar a {
          padding: 10px 15px;
        }
      }

      /* Mobile view */
      @media screen and (max-width: 520px) {
        .MainHeader {
          flex-direction: column;
          align-items: center;
          gap: 10px;
        }

        .navBar {
          flex-direction: column;
          align-items: center;
          width: 100%;
        }

        .navBar a {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <header class="MainHeader">
      <h1>This is Header</h1>

      <nav class="navBar">
        <a href="#">Home</a>
        <a href="#">Contact</a>
        <a href="#">School</a>
      </nav>
    </header>
  </body>
</html>
