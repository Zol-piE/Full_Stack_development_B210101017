<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html,
      body {
        width: 100%;
        font-family: sans-serif;
        box-sizing: border-box;
      }
      .MainHeader {
        width: 100%;
        background-color: aqua;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-left: 10px;
      }
      .navBar {
        display: flex;
        border: 2px solid red;
        gap: 10px;
        margin-right: 30px;
      }
      .navBar a {
        padding: 20px;
        text-decoration: none;
        color: black;
        font-weight: bold;
        margin-right: 10px;
        transition:
          gap 2s,
          margin-right 2s,
          padding 1s linear;
      }
      .navBar a:hover {
        background-color: beige;
        border-radius: 2rem;
        transform: scale(0.95);
      }
      @media screen and (max-width: 740px) {
        .navBar {
          gap: 5px;
        }
        .navBar a {
          padding: 15px;
          text-decoration: none;
          color: black;
          font-weight: bold;
          margin-right: 2px;
        }
      }
      @media screen and (max-width: 520px) {
        .MainHeader {
          flex-direction: column;
          align-items: center;
          justify-content: space-between;
        }
        .navBar {
          flex-direction: column;
          align-items: center;
          justify-content: space-between;
          margin: 0px;
        }
      }
    </style>
  </head>
  <body>
    <header class="MainHeader">
      <h1>This is Header</h1>
      <nav class="navBar">
        <a href="#">Home</a>
        <a href="#">Contact</a>
        <a href="#">School</a>
      </nav>
    </header>
  </body>
</html>
