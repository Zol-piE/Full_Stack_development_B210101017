<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0px;
        font-family: sans-serif;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background-color: #ffc567;
      }
      .containerOne {
        width: 1000px;
        height: 50%;
        background-color: #fb7da8;
        margin: 20px auto;
        border: 5px solid #00995e;
        display: flex;
        flex-direction: column;
      }
      h1 {
        font-size: 25px;
        text-align: center;
        width: 100%;
        background-color: #058cd7;
        padding: 20px 0px;
      }
      .containerTwo {
        display: flex;
        flex: 1;
      }
      .box1 {
        background-color: #fb7da8;
        flex: 1;
      }
      .box2 {
        background-color: #552cb7;
        flex: 2;
      }
      .box3 {
        background-color: #fd5a46;
        flex: 2;
      }
    </style>
  </head>
  <body>
    <article class="containerOne">
      <h1>Header</h1>
      <div class="containerTwo">
        <div class="box1">Box-1</div>
        <div class="box2">Box-2</div>
        <div class="box3">Box-3</div>
      </div>
    </article>
  </body>
</html>
