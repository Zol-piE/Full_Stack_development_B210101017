<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHALLANGE</title>
    <link rel="stylesheet" href="ChallangeStyle.css" />
  </head>
  <body>
    <div class="container">
      <article class="Box">
        <h1>Canvas Buy</h1>
        <div class="MainProduct">
          <div class="image">
            <img
              src="img/challenges.jpg"
              alt="htmlimage"
              width="100%"
              height="100%"
            />
          </div>
          <div class="product">
            <div class="BuyProduct">
              <p class="Price">$65</p>
              <p class="Shipping">Free shipping</p>
            </div>
            <div class="productInfo">
              <h3
                style="
                  padding: 5px 20px;
                  text-transform: uppercase;
                  font-weight: bold;
                "
              >
                Product Info
              </h3>
              <ul style="padding: 5px 20px">
                <li>a</li>
                <li>b</li>
                <li>c</li>
              </ul>
            </div>
          </div>
        </div>
        <button>Add Cart</button>
      </article>
    </div>
  </body>
</html>
