<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHALLANGE</title>
    <link rel="stylesheet" href="ChallangeStyle.css" />
  </head>
  <body>
    <div class="container">
      <article class="Box">
        <h1>Canvas Buy</h1>
        <div class="clearFixProduct">
          <div class="image">
            <img
              src="img/challenges.jpg"
              alt="htmlimage"
              width="100%"
              height="auto"
            />
          </div>
          <div class="product">
            <div class="clearFix">
              <p class="price">$65</p>
              <p class="shipping">Free shipping</p>
            </div>
            <div class="productInfo"></div>
          </div>
        </div>
      </article>
    </div>
  </body>
</html>
