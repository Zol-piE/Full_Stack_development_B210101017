<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      .container {
        width: 1000px;
        margin: 20px auto;
        border: 5px solid black;
        background-color: yellow;
        display: grid;
        grid-template-columns: 250px repeat(2, 1fr);
        column-gap: 10px;
      }
      .MainHeader {
        grid-column: 1/-1;
        text-align: center;
        font-weight: bold;
        text-transform: uppercase;
        padding: 10px;
      }
      button {
        grid-column: 1/-1;
      }
    </style>
  </head>
  <body>
    <article class="container">
      <h2 class="MainHeader">Header</h2>
      <img
        src="img/laura-jones.jpg"
        alt="image of person"
        width="250px"
        height="auto"
      />
      <div class="B2">Box Two</div>
      <div class="B3">Box Three</div>
      <button>add to cart</button>
    </article>
  </body>
</html>
