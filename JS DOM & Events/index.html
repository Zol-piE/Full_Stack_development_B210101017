<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button class="again">Again!</button>
      <h1>Guess my name !</h1>
      <h2>Between 1 to 20</h2>
      <div class="GuessLayout"></div>
      <div class="inputBoxes">
        <label for="inputNumber">Input Number</label>
        <input type="text" required id="inputNumber" />
        <button class="click">Check!</button>
      </div>
      <div class="scoreBox">
        <p class="message">Start Guessing....</p>
        <p>💯 Score:<span class="score">20</span></p>
        <p>🥇 Highscore:<span class="highscore">0</span></p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
