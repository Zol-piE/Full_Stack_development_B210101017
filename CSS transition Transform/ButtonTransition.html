<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: linear-gradient(
          to bottom right,
          rgb(49, 148, 235),
          rgb(47, 209, 238)
        );
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button {
        padding: 20px 40px;
        margin: 20px;
        text-transform: uppercase;
        font-weight: bold;
        box-shadow:
          5px 5px 20px 5px gray,
          -5px -5px 20px 5px gray;
        transition: transform 500ms ease;
      }
      .B1:hover {
        transform: translateY(-5px);
      }
      .B2:hover {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <button class="B1">Box-1</button>
    <button class="B2">Box-1</button>
  </body>
</html>
